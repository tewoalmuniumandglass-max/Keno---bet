<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Bet & Aviator Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #06090f; --card: #111621; --accent: #ffd700; --blue: #007bff; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: sans-serif; background: radial-gradient(circle, #1a2a44 0%, var(--bg) 100%); color: white; margin: 0; user-select: none; overflow-x: hidden; }
        
        .auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid var(--accent); }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .auth-card button { width: 100%; padding: 12px; background: linear-gradient(45deg, #b8860b, #ffd700); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { background: #0b4a8f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .balance-box { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); }

        .aviator-scene { height: 120px; background: #000; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #airplane { position: absolute; width: 50px; bottom: 10px; left: -60px; transition: all 0.3s linear; z-index: 10; filter: drop-shadow(0 0 10px var(--red)); }
        .cloud { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; animation: cloudMove 3s linear infinite; }
        @keyframes cloudMove { from { right: -50px; } to { right: 110%; } }

        .top-display { min-height: 50px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; background: rgba(0,0,0,0.3); }
        .ball { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; background: var(--accent); color: #000; animation: bounce 0.4s ease; }
        @keyframes bounce { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 15px; }
        .cell { background: var(--card); height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; border: 1px solid #222; }
        .cell.selected { background: var(--blue); border-color: white; }
        .cell.hit { background: var(--green) !important; transform: scale(1.1); }

        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-radius: 20px 20px 0 0; box-sizing: border-box; border-top: 1px solid #333; }
        .bet-btn { width: 100%; background: var(--green); border: none; color: white; font-weight: bold; font-size: 22px; border-radius: 12px; height: 55px; cursor: pointer; }

        #ticket-list { padding: 10px; margin-bottom: 180px; max-height: 150px; overflow-y: auto; }
        .ticket-card { background: #1a1d23; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h1 style="color:var(--accent)">KENO BET</h1>
        <input type="number" id="reg-phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="reg-pass" placeholder="ሚስጥር ቁጥር">
        <button onclick="handleLogin()">ይግቡ / ይመዝገቡ</button>
        <p id="auth-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="game-screen" class="hidden">
    <header>
        <div id="u-display-phone" style="font-weight:bold;">-</div>
        <div class="balance-box" id="u-balance">0.00 ETB</div>
    </header>

    <div class="aviator-scene">
        <div id="timer-display" style="position:absolute; width:100%; text-align:center; top:10px; font-size:30px; font-weight:bold; color:var(--accent); z-index:5;">00:60</div>
        <svg id="airplane" viewBox="0 0 24 24" fill="var(--red)">
            <path d="M21,16L22,13L21,10L15,10L13,4L11,4L12,10L6,10L4,7L2,7L3,10L2,13L3,16L4,16L6,13L12,13L11,19L13,19L15,13L21,13L21,16Z" />
        </svg>
    </div>

    <div class="top-display" id="top-display"></div>
    <div class="keno-grid" id="main-grid"></div>
    <div id="ticket-list"></div>

    <div class="controls">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>መጠን: <b id="bet-ui">5</b> ETB</span>
            <button onclick="clearGrid()" style="background:#444; border:none; color:white; padding:5px 10px; border-radius:5px;">አጽዳ</button>
        </div>
        <button class="bet-btn" onclick="buyTicket()">BET (ትኬት ቁረጥ)</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://mvfovqztomzbvhvauxc.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_12xn0x6_jG9f6vY_GjL-6vL-6vL-6vL-6vL-6vL'; // ያንተን ቁልፍ እዚህ ማረጋገጥህን እንዳትረሳ
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null, selected = [], activeTickets = [], timeLeft = 60, isDrawing = false;

    // ... (Login function እንዳለ ይሁን) ...

    function enterGame() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('u-display-phone').innerText = user.phone;
        updateBalanceUI();
        
        // Grid እንዲመጣ ትዕዛዙን እዚህ ጋር እናረጋግጥ
        initGrid(); 
        
        // ሰዓቱን ያስጀምራል
        if(!window.tickInterval) {
            window.tickInterval = setInterval(tick, 1000);
        }
        createClouds();
    }

    function initGrid() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ""; // መጀመሪያ ባዶ ያደርገዋል
        for(let i=1; i<=80; i++) {
            const c = document.createElement('div');
            c.className = 'cell'; 
            c.id = 'cell-' + i; 
            c.innerText = i;
            c.onclick = () => {
                if(isDrawing) return;
                if(c.classList.contains('selected')) { 
                    c.classList.remove('selected'); 
                    selected = selected.filter(n => n !== i); 
                } else if(selected.length < 10) { 
                    c.classList.add('selected'); 
                    selected.push(i); 
                }
            };
            grid.appendChild(c);
        }
        console.log("Grid Created!"); // ለሙከራ
    }

    // ... (ሌላው የ Draw እና የአቪዬተር ኮድ ይቀጥላል) ...
</script>

</body>
</html>
