<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gashabet Premium Keno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ያንተ ስታይል እዚህ ይቀጥላል... (ላሳጥረው ብዬ ነው) */
        :root { --bg: #0f1215; --header: #0b4a8f; --grid: #2c313c; --green: #28a745; --gold: #ffd700; --blue: #007bff; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; user-select: none; overflow-x: hidden; }
        header { background: var(--header); padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .top-display-area { background: #000; padding: 10px; min-height: 70px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-content: center; border-bottom: 2px solid #333; }
        .ball { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
        .ball.selected-ball { background: var(--blue); color: white; border: 1px solid #fff; }
        .ball.drawn-ball { background: var(--gold); color: #000; }
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; padding: 10px; }
        .cell { background: var(--grid); height: 35px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .cell.selected { background: var(--blue); color: white; }
        .cell.miss { background: #fff; color: #000; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; }
        button { padding: 10px 20px; background: var(--green); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>እንኳን ደህና መጡ</h2>
    <input type="text" id="username-input" placeholder="ስምዎን ያስገቡ...">
    <button onclick="login()">ይግቡ</button>
</div>

<header>
    <div id="user-display">Sam</div>
    <div class="balance-box"><span id="u-wallet">500.00</span> ETB</div>
</header>

<div class="top-display-area" id="top-display">
    <div style="color:#444; font-size:12px;">ምርጫዎ እዚህ ይታያሉ</div>
</div>

<div class="info-panel">
    <div id="timer-display" class="timer-ui">01:00</div>
    <div id="win-msg" class="win-estimate">MAX WIN: 0.00 ETB</div>
</div>

<div class="grid-container">
    <div class="keno-grid" id="grid"></div>
</div>

<div class="tickets-area" id="ticket-list"></div>

<div class="controls">
    <div class="bet-row">
        <div class="stepper">
            <button onclick="adjBet(-5)">-</button>
            <span id="bet-ui" style="font-weight:900;">10</span>
            <button onclick="adjBet(5)">+</button>
        </div>
        <button class="bet-btn" onclick="buyTicket()">ቲኬት ቁረጥ</button>
    </div>
</div>

<script>
    // 1. Supabase Setup - በራስህ ተካቸው
    const SB_URL = "የአንተ_SUPABASE_URL_እዚህ";
    const SB_KEY = "የአንተ_SUPABASE_ANON_KEY_እዚህ";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let user = { name: "", balance: 500 };
    let selected = [];
    let stake = 10;
    let tickets = [];
    let timeLeft = 60;
    let isDrawing = false;

    // Keno Paytable (ምሳሌ)
    const payTable = {
        10: [{h: 5, m: 2}, {h: 6, m: 10}, {h: 7, m: 50}, {h: 8, m: 500}, {h: 9, m: 2000}, {h: 10, m: 10000}]
    };

    function login() {
        const name = document.getElementById('username-input').value;
        if(!name) return;
        user.name = name;
        document.getElementById('user-display').innerText = name;
        document.getElementById('login-screen').classList.add('hidden');
        initGrid();
        setInterval(tick, 1000);
    }

    function initGrid() {
        const grid = document.getElementById('grid');
        for(let i=1; i<=80; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.onclick = () => toggleNum(i, cell);
            grid.appendChild(cell);
        }
    }

    function toggleNum(n, el) {
        if(isDrawing) return;
        if(selected.includes(n)) {
            selected = selected.filter(x => x !== n);
            el.classList.remove('selected');
        } else if(selected.length < 10) {
            selected.push(n);
            el.classList.add('selected');
        }
        updateUI();
    }

    function updateUI() {
        const topArea = document.getElementById('top-display');
        if(selected.length > 0) {
            topArea.innerHTML = selected.map(n => `<div class="ball selected-ball">${n}</div>`).join('');
            document.getElementById('win-msg').innerText = `SELECTED: ${selected.length} numbers`;
        } else {
            topArea.innerHTML = '<div style="color:#444; font-size:12px;">ምርጫዎ እዚህ ይታያሉ</div>';
        }
    }

    function adjBet(v) {
        stake = Math.max(5, stake + v);
        document.getElementById('bet-ui').innerText = stake;
    }

    async function buyTicket() {
        if(selected.length < 1 || user.balance < stake || isDrawing) return;

        const { data, error } = await supabase
            .from('keno_tickets')
            .insert([{
                player_name: user.name,
                selected_numbers: [...selected],
                stake: stake,
                status: 'pending'
            }])
            .select();

        if (error) {
            alert("Database Error!");
            return;
        }

        user.balance -= stake;
        tickets.push({ ...data[0], nums: [...selected], amt: stake, won: 0 });
        document.getElementById('u-wallet').innerText = user.balance.toFixed(2);
        renderTickets();
        clearGrid();
    }

    function renderTickets(drawn = []) {
        const list = document.getElementById('ticket-list');
        list.innerHTML = tickets.map(t => `
            <div class="ticket-card ${t.won > 0 ? 'winner' : ''}">
                <div>${t.nums.map(n => `<span class="t-num ${drawn.includes(n) ? 'match' : ''}">${n}</span>`).join('')}</div>
                <div style="font-size:10px; margin-top:5px;">Stake: ${t.amt} | ID: ${t.id} ${t.won > 0 ? `| WON: ${t.won}` : ''}</div>
            </div>
        `).join('');
    }

    function clearGrid() {
        selected = [];
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
        updateUI();
    }

    function tick() {
        if(isDrawing) return;
        timeLeft--;
        if(timeLeft <= 0) runDraw();
        document.getElementById('timer-display').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
    }

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        const itv = setInterval(async () => {
            let n;
            do { n = Math.floor(Math.random()*80)+1; } while(drawn.includes(n));
            drawn.push(n);
            
            const ball = document.createElement('div');
            ball.className = 'ball drawn-ball';
            ball.innerText = n;
            document.getElementById('top-display').appendChild(ball);
            document.querySelectorAll('.cell')[n-1].classList.add('miss');

            if(drawn.length >= 20) {
                clearInterval(itv);
                await finalizeGame(drawn);
            }
        }, 300);
    }

    async function finalizeGame(drawn) {
        for(let t of tickets) {
            const hits = t.nums.filter(n => drawn.includes(n)).length;
            let winAmount = 0;
            const rules = payTable[t.nums.length];
            if(rules) {
                const rule = rules.find(r => r.h === hits);
                if(rule) winAmount = t.amt * rule.m;
            }

            // Supabase ላይ አዘምን
            await supabase
                .from('keno_tickets')
                .update({ draw_numbers: drawn, won: winAmount, status: 'completed' })
                .eq('id', t.id);
            
            t.won = winAmount;
            user.balance += winAmount;
        }

        document.getElementById('u-wallet').innerText = user.balance.toFixed(2);
        renderTickets(drawn);

        setTimeout(() => {
            tickets = [];
            timeLeft = 60;
            isDrawing = false;
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('miss'));
            document.getElementById('top-display').innerHTML = "";
            renderTickets();
        }, 5000);
    }
</script>
</body>
</html>
