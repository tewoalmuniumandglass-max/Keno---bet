<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Bet & Aviator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #06090f; --card: #111621; --accent: #ffd700; --blue: #007bff; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; user-select: none; }
        .hidden { display: none !important; }
        
        /* Login Screen */
        .auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid var(--accent); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        
        /* Game Screen */
        header { background: #0b4a8f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .balance-box { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); }
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 15px; margin-bottom: 150px; }
        .cell { background: var(--card); height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; border: 1px solid #222; }
        .cell.selected { background: var(--blue); border-color: white; }
        .cell.hit { background: var(--green) !important; color: white; }
        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; border-top: 1px solid #333; box-sizing: border-box; }
        .bet-btn { width: 100%; background: var(--green); border: none; color: white; font-weight: bold; font-size: 18px; border-radius: 10px; height: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h2 style="color:var(--accent)">KENO BET</h2>
        <input type="number" id="phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="pass" placeholder="ሚስጥር ቁጥር">
        <button class="btn-gold" onclick="handleLogin()">ይግቡ / ይመዝገቡ</button>
        <p id="msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="game-screen" class="hidden">
    <header>
        <div id="u-phone" style="font-weight:bold;">-</div>
        <div class="balance-box" id="u-balance">0.00 ETB</div>
    </header>
    
    <div style="padding: 20px;">
        <h1 id="timer" style="font-size:40px; color:var(--accent); margin:0;">00:60</h1>
        <p style="color:#888;">ቀጣይ እጣ እስኪወጣ</p>
    </div>

    <div class="keno-grid" id="grid"></div>

    <div class="controls">
        <button class="bet-btn" onclick="buyTicket()">BET (ትኬት ቁረጥ)</button>
    </div>
</div>

<script>
    // Supabase Configuration
    const S_URL = 'https://mvfovqztomzbvhvauxc.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12Zm92cXp0b216YnZodmF1eGMiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczOTYyOTgxMiwiZXhwIjoyMDU1MjA1ODEyfQ.sb_publishable_12xn0x6_jG9f6vY_GjL-6vL-6vL-6vL-6vL-6vL';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    let currentUser = null, selected = [], timeLeft = 60;

    // Login/Register Function
    async function handleLogin() {
        const ph = document.getElementById('phone').value;
        const ps = document.getElementById('pass').value;
        const msg = document.getElementById('msg');
        if(!ph || !ps) return;

        try {
            let { data: user, error: fetchError } = await supabase.from('users').select('*').eq('phone', ph).maybeSingle();
            if (fetchError) throw fetchError;

            if (user) {
                if (user.password === ps) { loginSuccess(user); }
                else { msg.innerText = "የተሳሳተ ሚስጥር ቁጥር!"; }
            } else {
                const { data: newUser, error: insError } = await supabase
  .from('users')
  .insert([{ phone: ph, password: ps, balance: 100 }]) // እዚህ ጋር [] እና balance የሚለው መስተካከል አለበት
  .select()
  .single();
  if (insError) throw insError;
                loginSuccess(newUser);
            }
        } catch (e) {
            msg.innerText = "ስህተት፦ RLS መጥፋቱን አረጋግጥ! (" + e.message + ")";
        }
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('u-phone').innerText = user.phone;
        document.getElementById('u-balance').innerText = user.balance.toFixed(2) + " ETB";
        initGrid();
        startTimer();
    }

    function initGrid() {
        const g = document.getElementById('grid');
        for(let i=1; i<=80; i++) {
            let c = document.createElement('div');
            c.className = 'cell'; c.innerText = i;
            c.onclick = () => {
                if(c.classList.contains('selected')) {
                    c.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if(selected.length < 10) {
                    c.classList.add('selected');
                    selected.push(i);
                }
            };
            g.appendChild(c);
        }
    }

    function startTimer() {
        setInterval(() => {
            timeLeft--;
            if(timeLeft < 0) timeLeft = 60;
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);
    }

    function buyTicket() {
        if(selected.length === 0) { alert("እባክዎ ቁጥሮችን ይምረጡ!"); return; }
        alert(selected.length + " ቁጥሮችን መርጠዋል። መልካም እድል!");
    }
</script>
</body>
</html>
