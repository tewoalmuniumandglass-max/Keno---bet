<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KENO BET - Professional System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ያንተ የድሮ ስታይል እዚህ ጋር እንዳለ ይቀጥላል */
        :root { --bg: #0f1215; --header: #0b4a8f; --grid: #2c313c; --green: #28a745; --gold: #ffd700; --blue: #007bff; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; user-select: none; overflow-x: hidden; }
        .auth-container { position: fixed; inset: 0; background: #f4f7f9; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; text-align: center; color: #333; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-auth { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        header { background: var(--header); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .balance-box { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; color: var(--gold); font-weight: bold; border: 1px solid var(--gold); }
        .hidden { display: none !important; }
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; }
        .cell { background: var(--grid); height: 35px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: bold; border-radius: 4px; }
        .cell.selected { background: var(--blue); border: 1px solid #fff; }
        .draw-balls-area { min-height: 100px; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background: var(--gold); color: #000; }
        .controls { position: fixed; bottom: 0; width: 100%; background: #1a1d23; padding: 15px; box-sizing: border-box; }
        .ticket-card { background: #1a1d23; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 6px solid var(--blue); }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h2 id="auth-title">LOGIN</h2>
        <input type="text" id="phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-auth" onclick="handleAuth()">ይግቡ</button>
        <p style="font-size:13px; margin-top:10px;">አዲስ ነዎት? <span style="color:var(--blue); cursor:pointer;" onclick="toggleAuth()">REGISTER</span></p>
    </div>
</div>

<div id="game-screen" class="hidden">
    <header>
        <div id="p-name" style="font-weight:bold;">PLAYER</div>
        <div class="balance-box" id="u-balance">0.00 ETB</div>
    </header>

    <div style="display:flex; gap:10px; padding:10px; background:#1a1d23;">
        <button onclick="openModal('dep-modal')" style="flex:1; background:var(--green); color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">DEPOSIT</button>
        <button onclick="openModal('wit-modal')" style="flex:1; background:var(--gold); border:none; padding:10px; border-radius:5px; font-weight:bold;">WITHDRAW</button>
    </div>

    <div class="display-section" style="background:#000; padding:10px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span id="win-preview" style="color:var(--gold)">MAX WIN: 0.00 ETB</span>
            <span id="timer">00:60</span>
        </div>
        <div id="draw-display" class="draw-balls-area"></div>
    </div>

    <div id="grid-box" class="keno-grid"><div class="keno-grid" id="main-grid"></div></div>

    <div id="ticket-list" style="padding:10px;"></div>

    <div class="controls">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div style="flex:1; background:#2c313c; display:flex; justify-content:space-between; align-items:center; border-radius:8px; padding:0 15px;">
                <button onclick="adjStake(-5)" style="background:none; border:none; color:white; font-size:28px;">-</button>
                <span id="stake-val" style="font-weight:bold; font-size:20px;">5</span>
                <button onclick="adjStake(5)" style="background:none; border:none; color:white; font-size:28px;">+</button>
            </div>
            <button style="flex:0.4; background:#444; border:none; color:#fff; border-radius:8px;" onclick="clearSel()">CLEAR</button>
        </div>
        <button class="btn-auth" style="background:var(--green); font-size:20px; height:55px;" onclick="placeBet()">PLACE BET</button>
    </div>
</div>

<div id="dep-modal" class="auth-container hidden" style="background:rgba(0,0,0,0.9);"><div class="auth-card"><h3>DEPOSIT</h3><input type="text" id="d-tid" placeholder="TID"><input type="number" id="d-amt" placeholder="Amount"><button class="btn-auth" onclick="requestDeposit()">SEND</button><button onclick="closeModal('dep-modal')">CLOSE</button></div></div>
<div id="wit-modal" class="auth-container hidden" style="background:rgba(0,0,0,0.9);"><div class="auth-card"><h3>WITHDRAW</h3><input type="text" id="w-acc" placeholder="Account"><input type="number" id="w-amt" placeholder="Amount"><button class="btn-auth" onclick="handleWit()">SEND</button><button onclick="closeModal('wit-modal')">CLOSE</button></div></div>

<script>
    const _url = 'https://nvfwxqzitomzbvhvsuxo.supabase.co';
    const _key = 'YOUR_PUBLISHABLE_KEY_HERE'; // Anon Key እዚህ ይግባ
    const supabase = supabase.createClient(_url, _key);

    let balance = 0, selected = [], tickets = [], stake = 5, timeLeft = 60, drawing = false, isLogin = true, currentUser = null;
    const payTable = { 1:[0,17.5], 2:[0,5,50], 3:[0,0,10,250], 4:[0,0,5,50,400], 5:[0,0,0,10,100,750], 6:[0,0,0,5,50,250,2500] };

    function toggleAuth() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? "LOGIN" : "REGISTER"; }

    async function handleAuth() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const fakeEmail = `${phone}@keno.com`;
        if (isLogin) {
            const { error } = await supabase.auth.signInWithPassword({ email: fakeEmail, password: pass });
            if (error) alert("ስህተት!"); else checkSession();
        } else {
            const { error } = await supabase.auth.signUp({ email: fakeEmail, password: pass });
            if (error) alert(error.message); else alert("ተሳክቷል! አሁን ይግቡ።");
        }
    }

    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('p-name').innerText = currentUser.email.split('@')[0];
            fetchBalance(); initGrid(); setInterval(tick, 1000);
        }
    }

    async function fetchBalance() {
        let { data } = await supabase.from('profiles').select('balance').eq('id', currentUser.id).single();
        if (data) { balance = parseFloat(data.balance); updateUI(); }
    }

    async function syncBalance() {
        await supabase.from('profiles').update({ balance: balance }).eq('id', currentUser.id);
    }

    function initGrid() {
        const grid = document.getElementById('main-grid'); grid.innerHTML = "";
        for(let i=1; i<=80; i++) {
            const c = document.createElement('div'); c.className = 'cell'; c.innerText = i;
            c.onclick = () => {
                if(drawing || timeLeft < 2) return;
                if(c.classList.contains('selected')) { c.classList.remove('selected'); selected = selected.filter(x => x !== i); }
                else if(selected.length < 6) { c.classList.add('selected'); selected.push(i); }
                updateWinPreview();
            };
            grid.appendChild(c);
        }
    }

    function tick() { if(!drawing) { timeLeft--; document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`; if(timeLeft <= 0) startDraw(); } }

    function startDraw() {
        drawing = true; let drawn = []; const disp = document.getElementById('draw-display'); disp.innerHTML = "";
        const inv = setInterval(() => {
            let n; do { n = Math.floor(Math.random()*80)+1; } while(drawn.includes(n));
            drawn.push(n);
            const b = document.createElement('div'); b.className = 'ball drawn-ball'; b.innerText = n; disp.appendChild(b);
            if(drawn.length >= 20) { clearInterval(inv); finishRound(drawn); }
        }, 800);
    }

    async function finishRound(drawn) {
        let winSum = 0;
        tickets.forEach(t => {
            const hits = t.nums.filter(n => drawn.includes(n)).length;
            const mult = (payTable[t.nums.length] && payTable[t.nums.length][hits]) || 0;
            if(mult > 0) { t.win = (t.amt/5)*mult; winSum += t.win; }
        });
        balance += winSum; 
        updateUI(); 
        await syncBalance(); // ዳታቤዝ ላይ ሴቭ ያደርጋል
        setTimeout(() => { drawing = false; timeLeft = 60; tickets = []; disp.innerHTML = ""; renderTickets(); }, 5000);
    }

    async function placeBet() {
        if(selected.length === 0 || balance < stake) return;
        balance -= stake; tickets.push({ nums: [...selected], amt: stake, win: 0 });
        updateUI(); await syncBalance(); clearSel(); renderTickets();
    }

    function updateUI() { document.getElementById('u-balance').innerText = balance.toFixed(2) + " ETB"; }
    function clearSel() { selected = []; document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected')); }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function adjStake(v) { stake = Math.max(5, stake + v); document.getElementById('stake-val').innerText = stake; }
    window.onload = checkSession;
</script>
</body>
</html>
