<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Premium Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #06090f; --card: #111621; --accent: #ffd700; --blue: #007bff; --green: #2ecc71; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { background: #0b4a8f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .balance-box { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }
        
        .timer-display { font-size: 32px; font-weight: bold; color: var(--accent); text-align: center; padding: 10px; background: #000; }
        .top-display { min-height: 50px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; background: #161b22; }
        .ball { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background: var(--accent); color: #000; font-size: 14px; animation: pop 0.3s; }

        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 15px; margin-bottom: 160px; }
        .cell { background: var(--card); height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-weight: bold; border: 1px solid #222; transition: 0.2s; }
        .cell.selected { background: var(--blue); border-color: #fff; transform: scale(0.95); }
        .cell.hit { background: var(--green); color: white; box-shadow: 0 0 10px var(--green); }
        .cell.miss { background: #333; color: #666; }

        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; border-top: 1px solid #333; box-sizing: border-box; }
        .bet-btn { width: 100%; background: var(--green); border: none; color: white; font-weight: bold; font-size: 22px; border-radius: 12px; height: 55px; cursor: pointer; }

        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initGrid()">

<header>
    <div id="u-display-phone" style="font-weight:bold;">Gashabet User</div>
    <div class="balance-box" id="u-balance">500.00 ETB</div>
</header>

<div class="timer-display" id="timer-display">00:60</div>
<div class="top-display" id="top-display"></div>

<div class="keno-grid" id="main-grid"></div>

<div class="controls">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
        <span>BET: 10 ETB</span>
        <span id="selected-count" style="color:var(--accent)">Selected: 0/10</span>
    </div>
    <button class="bet-btn" onclick="buyTicket()">BET (ትኬት ቁረጥ)</button>
</div>

<script>
    let selected = [], timeLeft = 60, isDrawing = false;

    // 1. Grid-ኡን ወዲያውኑ እንዲሳል ማድረግ
    function initGrid() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ""; // ማጽዳት
        for(let i=1; i<=80; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.id = 'cell-' + i;
            c.innerText = i;
            c.onclick = () => toggleNumber(i, c);
            grid.appendChild(c);
        }
        setInterval(tick, 1000);
    }

    function toggleNumber(n, el) {
        if(isDrawing) return;
        if(selected.includes(n)) {
            selected = selected.filter(x => x !== n);
            el.classList.remove('selected');
        } else if(selected.length < 10) {
            selected.push(n);
            el.classList.add('selected');
        }
        document.getElementById('selected-count').innerText = `Selected: ${selected.length}/10`;
    }

    function tick() {
        if(isDrawing) return;
        timeLeft--;
        if(timeLeft <= 0) runDraw();
        document.getElementById('timer-display').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
    }

    function runDraw() {
        isDrawing = true;
        let drawn = [], count = 0;
        document.getElementById('top-display').innerHTML = "";

        const itv = setInterval(() => {
            let n = Math.floor(Math.random() * 80) + 1;
            while(drawn.includes(n)) n = Math.floor(Math.random() * 80) + 1;
            drawn.push(n);

            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.innerText = n;
            document.getElementById('top-display').appendChild(ball);

            const cell = document.getElementById('cell-' + n);
            if(cell) {
                if(cell.classList.contains('selected')) cell.classList.add('hit');
                else cell.classList.add('miss');
            }

            count++;
            if(count >= 20) {
                clearInterval(itv);
                setTimeout(resetGame, 5000);
            }
        }, 400);
    }

    function resetGame() {
        isDrawing = false;
        timeLeft = 60;
        selected = [];
        document.getElementById('top-display').innerHTML = "";
        document.getElementById('selected-count').innerText = "Selected: 0/10";
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('selected', 'hit', 'miss');
        });
    }

    function buyTicket() {
        if(selected.length === 0) { alert("እባክዎ ቁጥር ይምረጡ!"); return; }
        alert("ትኬት ቁጥር " + selected.join(', ') + " ተቆርጧል!");
    }
</script>
</body>
</html>
