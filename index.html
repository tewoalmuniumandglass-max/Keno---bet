<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Bet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #06090f; color: white; text-align: center; padding: 20px; }
        .card { background: #111621; padding: 30px; border-radius: 15px; border: 1px solid #ffd700; max-width: 350px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        button { width: 95%; padding: 12px; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="card">
    <h2 style="color:#ffd700">KENO BET</h2>
    <input type="number" id="phone" placeholder="ስልክ ቁጥር">
    <input type="password" id="pass" placeholder="ሚስጥር ቁጥር">
    <button onclick="login()">ይግቡ / ይመዝገቡ</button>
    <p id="msg" style="color:red; font-size:12px; margin-top:10px;"></p>
</div>

<div id="game-screen" class="hidden">
    <h1 style="color:#ffd700">እንኳን መጡ!</h1>
    <div id="u-display" style="font-size:20px; margin-bottom:20px;"></div>
    <div id="u-balance" style="font-size:24px; color:#2ecc71; font-weight:bold;"></div>
    <button onclick="location.reload()" style="background:#444; color:white; margin-top:20px;">ውጣ (Logout)</button>
</div>

<script>
    // ያንተ ትክክለኛ የ Supabase መረጃዎች
    const S_URL = 'https://mvfovqztomzbvhvauxc.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12Zm92cXp0b216YnZodmF1eGMiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczOTYyOTgxMiwiZXhwIjoyMDU1MjA1ODEyfQ.sb_publishable_12xn0x6_jG9f6vY_GjL-6vL-6vL-6vL-6vL-6vL';
    
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    async function login() {
        const ph = document.getElementById('phone').value;
        const ps = document.getElementById('pass').value;
        const msg = document.getElementById('msg');
        
        if(!ph || !ps) { msg.innerText = "እባክዎ ሁሉንም ይሙሉ"; return; }
        msg.innerText = "በመግባት ላይ...";

        try {
            // 1. ተጠቃሚውን መፈለግ
            let { data: user, error: fetchError } = await supabaseClient
                .from('users')
                .select('*')
                .eq('phone', ph)
                .maybeSingle();

            if (fetchError) throw fetchError;

            if (user) {
                if (user.password === ps) {
                    showGame(user);
                } else {
                    msg.innerText = "የተሳሳተ ሚስጥር ቁጥር!";
                }
            } else {
                // 2. አዲስ ተጠቃሚ መመዝገብ
                const { data: newUser, error: insertError } = await supabaseClient
                    .from('users')
                    .insert([{ phone: ph, password: ps, balance: 100 }])
                    .select()
                    .single();

                if (insertError) throw insertError;
                showGame(newUser);
            }
        } catch (err) {
            console.error(err);
            msg.innerText = "ስህተት ተፈጥሯል! (RLS ጠፍቷል?)";
        }
    }

    function showGame(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('u-display').innerText = "ስልክ: " + user.phone;
        document.getElementById('u-balance').innerText = "ቀሪ ሂሳብ: " + user.balance + " ETB";
    }
</script>
</body>
</html>
