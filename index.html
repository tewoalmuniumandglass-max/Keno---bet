<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Bet - Live System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #06090f; --card: #111621; --accent: #ffd700; --blue: #007bff; --green: #2ecc71; }
        body { font-family: sans-serif; background: radial-gradient(circle, #1a2a44 0%, var(--bg) 100%); color: white; margin: 0; user-select: none; }
        
        /* Auth Screen */
        .auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid var(--accent); }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .auth-card button { width: 100%; padding: 12px; background: linear-gradient(45deg, #b8860b, #ffd700); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Header */
        header { background: #0b4a8f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .balance-box { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); }

        /* Game UI */
        .top-display { background: #000; min-height: 80px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 5px; padding: 10px; }
        .ball { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .drawn-ball { background: var(--accent); color: #000; }
        .hit-ball { background: var(--blue); color: white; border: 2px solid white; }
        
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 15px; }
        .cell { background: var(--card); height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .cell.selected { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .cell.miss { background: #fff !important; color: #000; }

        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        .bet-btn { width: 100%; background: var(--green); border: none; color: white; font-weight: bold; font-size: 22px; border-radius: 12px; height: 55px; cursor: pointer; }

        #ticket-list { padding: 10px; margin-bottom: 180px; }
        .ticket-card { background: #1a1d23; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h1 style="color:var(--accent)">KENO BET</h1>
        <input type="number" id="reg-phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="reg-pass" placeholder="ሚስጥር ቁጥር">
        <button onclick="handleLogin()">ይግቡ / ይመዝገቡ</button>
        <p id="auth-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="game-screen" class="hidden">
    <header>
        <div id="u-display-phone" style="font-weight:bold;">-</div>
        <div class="balance-box" id="u-balance">0.00 ETB</div>
    </header>

    <div class="top-display" id="top-display"></div>
    <div id="timer-display" style="text-align:center; font-size:24px; font-weight:bold; padding:10px;">00:60</div>

    <div class="keno-grid" id="main-grid"></div>

    <div id="ticket-list"></div>

    <div class="controls">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>መጠን: <b id="bet-ui">5</b> ETB</span>
            <button onclick="clearGrid()" style="background:#444; border:none; color:white; padding:5px 15px; border-radius:5px;">አጽዳ</button>
        </div>
        <button class="bet-btn" onclick="buyTicket()">BET (ትኬት ቁረጥ)</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_KEY';
    const supabase = lib.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;
    let selected = [];
    let tickets = [];
    let stake = 5;
    let timeLeft = 60;
    let isDrawing = false;

    async function handleLogin() {
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;
        if(!phone || !pass) return;

        let { data: dbUser } = await supabase.from('users').select('*').eq('phone', phone).single();

        if (dbUser) {
            if (dbUser.password === pass) { user = dbUser; enterGame(); }
            else { document.getElementById('auth-msg').innerText = "የተሳሳተ ፓስወርድ!"; }
        } else {
            const { data: newUser } = await supabase.from('users').insert([{ phone, password: pass, balance: 100 }]).select().single();
            if(newUser) { user = newUser; enterGame(); }
        }
    }

    function enterGame() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('u-display-phone').innerText = user.phone;
        updateBalanceUI();
        initGrid();
        setInterval(tick, 1000);
    }

    function initGrid() {
        const grid = document.getElementById('main-grid');
        for(let i=1; i<=80; i++) {
            const c = document.createElement('div');
            c.className = 'cell'; c.innerText = i;
            c.onclick = () => {
                if(isDrawing) return;
                if(c.classList.contains('selected')) {
                    c.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if(selected.length < 10) {
                    c.classList.add('selected');
                    selected.push(i);
                }
            };
            grid.appendChild(c);
        }
    }

    async function buyTicket() {
        if(selected.length === 0 || user.balance < stake || isDrawing) return alert("መረጃ ያረጋግጡ");

        // 1. ባላንስ መቀነስ
        const newBal = user.balance - stake;
        const { error } = await supabase.from('users').update({ balance: newBal }).eq('phone', user.phone);
        
        if(!error) {
            // 2. ትኬት መመዝገብ
            await supabase.from('tickets').insert([{ user_phone: user.phone, selected_numbers: selected, stake_amount: stake }]);
            
            user.balance = newBal;
            updateBalanceUI();
            tickets.push({ nums: [...selected], amt: stake, won: 0 });
            renderTickets();
            clearGrid();
        }
    }

    function renderTickets(drawn = []) {
        const list = document.getElementById('ticket-list');
        list.innerHTML = tickets.map(t => `
            <div class="ticket-card">
                <div>${t.nums.map(n => `<span style="color:${drawn.includes(n)?'#007bff':'white'}">${n}</span>`).join(', ')}</div>
                <div style="font-size:10px; color:#888;">Stake: ${t.amt} ETB ${t.won > 0 ? '| Win: '+t.won : ''}</div>
            </div>
        `).join('');
    }

    function tick() {
        if(isDrawing) return;
        timeLeft--;
        if(timeLeft <= 0) runDraw();
        document.getElementById('timer-display').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
    }

    function runDraw() {
        isDrawing = true;
        let drawn = [];
        const itv = setInterval(() => {
            let n = Math.floor(Math.random()*80)+1;
            while(drawn.includes(n)) n = Math.floor(Math.random()*80)+1;
            drawn.push(n);
            
            const ball = document.createElement('div');
            ball.className = 'ball drawn-ball';
            ball.innerText = n;
            document.getElementById('top-display').appendChild(ball);

            if(drawn.length >= 20) {
                clearInterval(itv);
                calculateFinal(drawn);
            }
        }, 500);
    }

    async function calculateFinal(drawn) {
        let totalWin = 0;
        tickets.forEach(t => {
            const hits = t.nums.filter(n => drawn.includes(n)).length;
            if(hits >= 2) { // ለምሳሌ ከ 2 በላይ ሲያገኝ
                t.won = t.amt * hits; 
                totalWin += t.won;
            }
        });

        if(totalWin > 0) {
            user.balance += totalWin;
            await supabase.from('users').update({ balance: user.balance }).eq('phone', user.phone);
            updateBalanceUI();
        }
        renderTickets(drawn);
        setTimeout(() => {
            tickets = []; timeLeft = 60; isDrawing = false;
            document.getElementById('top-display').innerHTML = "";
            renderTickets();
        }, 5000);
    }

    function updateBalanceUI() { document.getElementById('u-balance').innerText = user.balance.toFixed(2) + " ETB"; }
    function clearGrid() { selected = []; document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected')); }

</script>
</body>
</html>
